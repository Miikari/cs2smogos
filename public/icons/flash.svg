<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Body -->
  <rect x="16" y="20" width="16" height="20" rx="4" fill="#c8a830"/>
  <!-- Top cap -->
  <rect x="19" y="14" width="10" height="7" rx="2" fill="#a08020"/>
  <!-- Pin -->
  <line x1="24" y1="14" x2="24" y2="10" stroke="#e8c840" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="9" r="2" fill="#e8c840"/>
  <!-- Flash burst -->
  <line x1="24" y1="2" x2="24" y2="6" stroke="#ffe060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="4" x2="28" y2="7" stroke="#ffe060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="8" x2="31" y2="10" stroke="#ffe060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="4" x2="20" y2="7" stroke="#ffe060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="8" x2="17" y2="10" stroke="#ffe060" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="9" r="3" fill="#fff8c0" opacity="0.6"/>
  <!-- Lever -->
  <rect x="30" y="21" width="5" height="3" rx="1" fill="#e0b830"/>
</svg>
