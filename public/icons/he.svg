<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Body -->
  <rect x="16" y="20" width="16" height="20" rx="4" fill="#c03030"/>
  <!-- Segmentation lines -->
  <line x1="16" y1="27" x2="32" y2="27" stroke="#e04040" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="33" x2="32" y2="33" stroke="#e04040" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="20" x2="22" y2="40" stroke="#e04040" stroke-width="1" opacity="0.5"/>
  <line x1="26" y1="20" x2="26" y2="40" stroke="#e04040" stroke-width="1" opacity="0.5"/>
  <!-- Top cap -->
  <rect x="19" y="14" width="10" height="7" rx="2" fill="#902020"/>
  <!-- Pin -->
  <line x1="24" y1="14" x2="24" y2="10" stroke="#ff6060" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="9" r="2" fill="#ff6060"/>
  <!-- Explosion sparks -->
  <line x1="24" y1="3" x2="24" y2="7" stroke="#ff8040" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="5" x2="27" y2="8" stroke="#ff8040" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="5" x2="21" y2="8" stroke="#ff8040" stroke-width="2" stroke-linecap="round"/>
  <!-- Lever -->
  <rect x="30" y="21" width="5" height="3" rx="1" fill="#e04040"/>
</svg>
